<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Detail | Syamil Muhammad Aulia</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

    <style>
      /* Style khusus halaman detail */
      .detail-wrapper {
        padding: 12rem 9% 5rem;
        min-height: 100vh;
      }
      .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 1rem;
        color: var(--main-color);
        font-size: 1.6rem;
        margin-bottom: 3rem;
        transition: 0.3s;
        font-weight: 600;
      }
      .back-btn:hover {
        transform: translateX(-5px);
        color: white;
      }
      .detail-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6rem;
        align-items: start;
      }
      .detail-img img {
        width: 100%;
        border-radius: 2rem;
        border: 2px solid var(--main-color);
        box-shadow: 0 0 25px rgba(183, 75, 75, 0.3);
        transition: 0.4s;
      }
      .detail-img img:hover {
        transform: scale(1.02);
      }
      .tech-stack {
        display: flex;
        gap: 1.2rem;
        flex-wrap: wrap;
        margin-top: 2.5rem;
      }
      .tech-badge {
        background: rgba(183, 75, 75, 0.1);
        border: 1px solid var(--main-color);
        padding: 0.6rem 1.8rem;
        border-radius: 5rem;
        font-size: 1.2rem;
        color: white;
      }
      .feature-list {
        background: var(--second-bg-color);
        padding: 3rem;
        border-radius: 2rem;
        margin-top: 3rem;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
      .feature-list h3 {
        font-size: 2.2rem;
        margin-bottom: 2rem;
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      .feature-list ul {
        list-style: none;
      }
      .feature-list li {
        font-size: 1.5rem;
        margin-bottom: 1.5rem;
        color: #ccc;
        display: flex;
        align-items: flex-start;
        gap: 1.2rem;
        line-height: 1.5;
      }
      .feature-list i {
        color: var(--main-color);
        margin-top: 0.3rem;
      }
      .btn-group {
        display: flex;
        gap: 2rem;
        margin-top: 3rem;
      }

      /* Responsive Layout */
      @media (max-width: 991px) {
        .detail-container {
          grid-template-columns: 1fr;
          gap: 4rem;
        }
        .detail-info h1 {
          font-size: 3.5rem !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-transition"></div>

    <header>
      <a href="index.html" class="logo">SYAMIL</a>
      <i class="fa-solid fa-bars" id="menu-icon"></i>
      <nav class="navbar">
        <a href="index.html#home">Home</a>
        <a href="index.html#services">Service</a>
        <a href="index.html#education">Education</a>
        <a href="index.html#experience">Experience</a>
        <a href="index.html#contact">Contact</a>
        <a href="projects.html" class="active">Projects</a>
      </nav>
    </header>

    <div class="detail-wrapper">
      <a href="projects.html" class="back-btn" data-aos="fade-right">
        <i class="fa-solid fa-arrow-left"></i> Kembali ke Daftar Proyek
      </a>

      <div class="detail-container">
        <div class="detail-info" data-aos="fade-up" data-aos-delay="200">
          <h1
            id="proj-title"
            style="
              font-size: 4.8rem;
              line-height: 1.1;
              color: var(--main-color);
            "
          >
            Memuat Judul...
          </h1>
          <p
            id="proj-desc"
            style="
              font-size: 1.7rem;
              margin: 3rem 0;
              line-height: 1.8;
              color: #eee;
              text-align: justify;
            "
          ></p>

          <div class="btn-group">
            <a href="#" id="proj-live" target="_blank" class="btn">Live Demo</a>
            <a href="#" id="proj-repo" target="_blank" class="btn-outline"
              >Lihat Github</a
            >
          </div>

          <h3
            style="
              margin-top: 4rem;
              font-size: 2rem;
              border-bottom: 2px solid var(--main-color);
              display: inline-block;
              padding-bottom: 0.5rem;
            "
          >
            Technologies Used
          </h3>
          <div id="proj-tech" class="tech-stack"></div>
        </div>

        <div class="detail-content" data-aos="fade-left" data-aos-delay="400">
          <div class="detail-img">
            <img id="proj-img" src="" alt="Preview Project" />
          </div>
          <div class="feature-list">
            <h3><i class="fa-solid fa-wand-magic-sparkles"></i> Fitur Utama</h3>
            <ul id="proj-features"></ul>
          </div>
        </div>
      </div>
    </div>

        },

          features: [

        },
        "katalog-rumah": {

        },
        "web-kelas": {

          desc: "Wadah digital untuk menyimpan kenangan, jadwal, dan struktur organisasi kelas dalam satu tempat.",

          ],
          live: "https://kelas9a1.vercel.app/",
          repo: "#",
        },
        todo: {
          title: "Website Dokumentasi Kelas",
          desc: "Aplikasi to-do list untuk mengatur produktivitas dengan fitur ceklis dan hapus tugas.",

        },
        landpro: {

        },

          tech: ["JavaScript", "TypeScript", "CSS"],
          features: ["Infografis", "Jadwal Event", "Struktur OSIS"],
          live: "https://bestsmpipbaitulmaal.vercel.app/",
          repo: "#",
        },
        ekspedisi: {
          title: "EKSPEDISI MALANG",

          tech: ["JavaScript", "HTML", "CSS"],
          features: ["Infografis", "Jadwal Event", "Struktur OSIS"],
          live: "https://syamilmuhammadaulia-glitch.github.io/RT03Ekspedisi/",
          repo: "#",
        },
      };

      // Logika untuk mengambil ID dari URL
      const params = new URLSearchParams(window.location.search);
      const projectId = params.get("id");
      const data = projectData[projectId];

      const detailContainer = document.querySelector(".detail-container");

      if (data) {
        // Isi data ke elemen
        document.getElementById("proj-title").innerText = data.title;
        document.getElementById("proj-desc").innerText = data.desc;
        document.getElementById("proj-img").src = data.img;
        document.getElementById("proj-live").href = data.live;
        document.getElementById("proj-repo").href = data.repo;

        // Render Badge Teknologi
        const techContainer = document.getElementById("proj-tech");
        data.tech.forEach((t) => {
          techContainer.innerHTML += `<span class="tech-badge">${t}</span>`;
        });

        // Render Daftar Fitur
        const featContainer = document.getElementById("proj-features");
        data.features.forEach((f) => {
          featContainer.innerHTML += `<li><i class="fa-solid fa-circle-check"></i> ${f}</li>`;
        });
      } else {
        // Jika ID tidak ditemukan
        detailContainer.innerHTML = `
          <div style="text-align: center; grid-column: 1 / -1; padding: 5rem 0;">
            <h2 style="font-size: 3rem; color: white; margin-bottom: 2rem;">Ups! Proyek Tidak Ditemukan</h2>
            <p style="font-size: 1.6rem; color: #ccc; margin-bottom: 3rem;">Data proyek yang Anda cari mungkin telah dipindahkan atau dihapus.</p>
            <a href="projects.html" class="btn">Kembali ke Daftar Proyek</a>
          </div>`;

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <script src="script.js"></script>

    <script>
      // Jalankan AOS
      AOS.init({
        duration: 1000,
        once: true,
        offset: 100,
      });

</html>
